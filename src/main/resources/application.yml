spring:
  datasource:
    url: jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jackson:
    serialization:
      fail-on-empty-beans: false

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.example.distributedsystem.entity

server:
  port: 8080

