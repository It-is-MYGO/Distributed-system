spring:
  datasource:
    url: jdbc:h2:file:./data/demo;MODE=MYSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  h2:
    console:
      enabled: true
  jackson:
    serialization:
      fail-on-empty-beans: false
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

server:
  port: 8080

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  jwt:
    secret: "distributed-system-demo-secret-key-distributed-system-demo-secret"
    expire-hours: 24
