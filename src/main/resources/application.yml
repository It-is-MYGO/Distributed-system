spring:
  datasource:
    url: jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jackson:
    serialization:
      fail-on-empty-beans: false
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

server:
  port: 8080
