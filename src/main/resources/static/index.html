<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>账号中心</title>
    <style>
      :root {
        --bg1: #0a1022;
        --bg2: #111833;
        --card: rgba(15, 23, 42, 0.62);
        --border: rgba(148, 163, 184, 0.24);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --primary: #7c3aed;
        --primary-2: #3b82f6;
        --ok: #10b981;
        --bad: #ef4444;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        color: var(--text);
        font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
        background:
          radial-gradient(900px 520px at 10% 12%, rgba(124, 58, 237, 0.28), transparent 60%),
          radial-gradient(900px 520px at 88% 84%, rgba(59, 130, 246, 0.22), transparent 60%),
          linear-gradient(150deg, var(--bg1), var(--bg2));
      }

      .blob {
        position: fixed;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        filter: blur(65px);
        opacity: 0.5;
        pointer-events: none;
      }
      .blob.a { top: -80px; right: -40px; background: #7c3aed; }
      .blob.b { bottom: -80px; left: -30px; background: #3b82f6; }

      .page {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 24px 14px;
      }

      .card {
        width: min(440px, 100%);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px;
        background: linear-gradient(160deg, rgba(30, 41, 59, 0.7), var(--card));
        backdrop-filter: blur(12px);
        box-shadow: 0 30px 70px rgba(2, 6, 23, 0.55);
      }

      .title {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0.2px;
      }
      .subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .switch {
        margin-top: 20px;
        position: relative;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 6px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.65);
      }

      .switch-indicator {
        position: absolute;
        top: 6px;
        left: 6px;
        width: calc(50% - 7px);
        height: calc(100% - 12px);
        border-radius: 10px;
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        transition: transform 220ms ease;
      }
      .switch[data-mode="register"] .switch-indicator {
        transform: translateX(calc(100% + 8px));
      }

      .tab {
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 14px;
        font-weight: 650;
        padding: 10px 8px;
        border-radius: 10px;
        cursor: pointer;
        position: relative;
        z-index: 1;
      }
      .tab.active { color: white; }

      .form {
        margin-top: 18px;
        display: grid;
        gap: 12px;
      }

      .field label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 13px;
      }
      .input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 13px;
        background: rgba(15, 23, 42, 0.45);
        color: var(--text);
        font-size: 14px;
        outline: none;
        transition: border-color 180ms ease, box-shadow 180ms ease;
      }
      .input:focus {
        border-color: rgba(124, 58, 237, 0.8);
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.22);
      }
      .input::placeholder { color: #64748b; }

      .hint {
        color: var(--muted);
        font-size: 12px;
        min-height: 18px;
      }

      .btn {
        margin-top: 4px;
        border: 0;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 15px;
        font-weight: 700;
        color: #fff;
        cursor: pointer;
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        box-shadow: 0 14px 30px rgba(59, 130, 246, 0.22);
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .footer {
        margin-top: 16px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 12px;
      }

      .message {
        margin-top: 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 11px 12px;
        font-size: 13px;
        line-height: 1.5;
        background: rgba(15, 23, 42, 0.55);
        white-space: pre-wrap;
      }
      .message.success { border-color: rgba(16, 185, 129, 0.45); color: #ccfbf1; }
      .message.error { border-color: rgba(239, 68, 68, 0.45); color: #ffe4e6; }
      .message.info { border-color: rgba(59, 130, 246, 0.45); color: #dbeafe; }
    </style>
  </head>
  <body>
    <div class="blob a"></div>
    <div class="blob b"></div>
    <div class="page">
      <main class="card">
        <h1 class="title">欢迎回来</h1>
        <p class="subtitle">登录或注册你的账号，继续使用秒杀系统 Demo。</p>

        <div class="switch" id="modeSwitch" data-mode="login" role="tablist" aria-label="登录注册切换">
          <span class="switch-indicator" aria-hidden="true"></span>
          <button class="tab active" id="tabLogin" type="button" role="tab" aria-selected="true">登录</button>
          <button class="tab" id="tabRegister" type="button" role="tab" aria-selected="false">注册</button>
        </div>

        <form class="form" id="authForm" novalidate>
          <div class="field">
            <label for="username">用户名</label>
            <input class="input" id="username" type="text" placeholder="请输入用户名" />
          </div>
          <div class="field">
            <label for="password">密码</label>
            <input class="input" id="password" type="password" placeholder="请输入密码" />
          </div>
          <div class="hint" id="formHint"></div>
          <button class="btn" id="submitBtn" type="submit">登录</button>
        </form>

        <div id="message" class="message info" hidden></div>

        <div class="footer">
          <span id="modeDesc">当前模式：登录</span>
          <span id="apiInfo"></span>
        </div>
      </main>
    </div>

    <script>
      const API = {
        login: "/api/user/login",
        register: "/api/user/register",
      };

      const els = {
        modeSwitch: document.getElementById("modeSwitch"),
        tabLogin: document.getElementById("tabLogin"),
        tabRegister: document.getElementById("tabRegister"),
        authForm: document.getElementById("authForm"),
        username: document.getElementById("username"),
        password: document.getElementById("password"),
        submitBtn: document.getElementById("submitBtn"),
        formHint: document.getElementById("formHint"),
        modeDesc: document.getElementById("modeDesc"),
        apiInfo: document.getElementById("apiInfo"),
        message: document.getElementById("message"),
      };

      const storageKey = "demo.last_username";
      let mode = "login";
      let busy = false;

      function setMode(nextMode) {
        mode = nextMode;
        const isLogin = mode === "login";

        els.modeSwitch.dataset.mode = mode;
        els.tabLogin.classList.toggle("active", isLogin);
        els.tabRegister.classList.toggle("active", !isLogin);
        els.tabLogin.setAttribute("aria-selected", String(isLogin));
        els.tabRegister.setAttribute("aria-selected", String(!isLogin));

        els.submitBtn.textContent = isLogin ? "登录" : "注册";
        els.modeDesc.textContent = `当前模式：${isLogin ? "登录" : "注册"}`;
        els.formHint.textContent = isLogin ? "输入账号密码即可登录。" : "首次使用请先注册账号。";
        hideMessage();
      }

      function showMessage(type, text) {
        els.message.hidden = false;
        els.message.className = `message ${type}`;
        els.message.textContent = text;
      }

      function hideMessage() {
        els.message.hidden = true;
      }

      function setBusy(flag) {
        busy = flag;
        els.tabLogin.disabled = flag;
        els.tabRegister.disabled = flag;
        els.submitBtn.disabled = flag;
      }

      function validate(username, password) {
        if (!username) return "用户名不能为空";
        if (!password) return "密码不能为空";
        if (username.length < 2) return "用户名至少 2 个字符";
        if (password.length < 4) return "密码至少 4 位";
        return null;
      }

      function isSuccessText(text) {
        return String(text).includes("成功");
      }

      async function postText(url, data, timeoutMs = 8000) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), timeoutMs);
        try {
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
            signal: ctrl.signal,
          });
          const text = await res.text();
          if (!res.ok) throw new Error(`HTTP ${res.status}: ${text || res.statusText}`);
          return text;
        } catch (error) {
          if (error.name === "AbortError") throw new Error("请求超时，请稍后重试");
          throw new Error(error.message || "网络异常，请检查后端服务");
        } finally {
          clearTimeout(timer);
        }
      }

      els.tabLogin.addEventListener("click", () => !busy && setMode("login"));
      els.tabRegister.addEventListener("click", () => !busy && setMode("register"));

      els.authForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (busy) return;

        const username = (els.username.value || "").trim();
        const password = els.password.value || "";
        const err = validate(username, password);
        if (err) {
          showMessage("error", err);
          return;
        }

        const isLogin = mode === "login";
        const url = isLogin ? API.login : API.register;
        const action = isLogin ? "登录" : "注册";

        setBusy(true);
        showMessage("info", `${action}中，请稍候...`);
        try {
          const text = await postText(url, { username, password });
          localStorage.setItem(storageKey, username);
          showMessage(isSuccessText(text) ? "success" : "error", text);
          if (!isLogin && isSuccessText(text)) {
            els.password.value = "";
            setMode("login");
          }
        } catch (e) {
          showMessage("error", `${action}失败：${e.message}`);
        } finally {
          setBusy(false);
        }
      });

      // init
      const lastName = localStorage.getItem(storageKey);
      if (lastName) els.username.value = lastName;
      els.apiInfo.textContent = `API：${window.location.origin}`;
      setMode("login");
    </script>
  </body>
</html>
