<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分布式秒杀系统 - 登录</title>
    <link rel="stylesheet" href="mall/css/neo-mall.css">
</head>
<body>
<main class="auth-page">
    <section class="auth-visual">
        <a class="brand" href="/shop.html">
            <span class="brand-mark">F</span>
            <span><strong>分布式秒杀系统</strong><small style="color:#c7fff6;">库存秒杀商城</small></span>
        </a>
        <div>
            <p class="eyebrow">Distributed System Mall</p>
            <h1>登录后继续购物、加购和结算。</h1>
            <p>前端已接入用户服务、商品服务、购物车服务和订单服务，适合演示完整商城业务闭环。</p>
        </div>
    </section>
    <section class="auth-panel">
        <h1>会员登录</h1>
        <p>使用账号进入商城系统。</p>
        <form class="auth-form" id="loginForm">
            <div class="field">
                <label for="loginName">账号 / 手机号</label>
                <input id="loginName" autocomplete="username" placeholder="请输入账号">
            </div>
            <div class="field">
                <label for="password">密码</label>
                <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码">
            </div>
            <button class="btn primary" type="submit">登录</button>
        </form>
        <p>还没有账号？<a style="color:var(--brand);font-weight:800;" href="/register.html">立即注册</a></p>
        <a class="btn ghost" href="/shop.html" style="margin-top:12px;">先逛商城</a>
    </section>
</main>
<script src="mall/js/app-common.js"></script>
<script>
    const { $, apiRequest, setToken, toast } = AppCommon;
    $("#loginForm").addEventListener("submit", async event => {
        event.preventDefault();
        const username = $("#loginName").value.trim();
        const password = $("#password").value.trim();
        if (!username || !password) return toast("请输入账号和密码", "error");
        try {
            const result = await apiRequest("/user/login", {
                method: "POST",
                body: JSON.stringify({ username, password })
            });
            if (!result?.token) throw new Error(result?.message || "登录失败");
            setToken(result.token);
            const redirect = new URLSearchParams(location.search).get("redirect") || "/shop.html";
            location.href = redirect;
        } catch (error) {
            toast(`登录失败：${error.message}`, "error");
        }
    });
</script>
</body>
</html>
