<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>秒杀系统 - 账号中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-5%, -5%); }
        }

        .container {
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: #f5f5f5;
            padding: 6px;
            border-radius: 60px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.3s ease;
            color: #666;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            display: block;
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .footer-info {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>⚡ 秒杀系统</h1>
                <p>Seckill System Demo</p>
            </div>

            <div class="tabs">
                <button class="tab active" id="loginTab">登录</button>
                <button class="tab" id="registerTab">注册</button>
            </div>

            <form id="loginForm" style="display: block;">
                <div class="form-group">
                    <label>用户名</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="loginUsername" class="form-control" placeholder="请输入用户名" autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="loginPassword" class="form-control" placeholder="请输入密码" autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn">登录</button>
            </form>

            <form id="registerForm" style="display: none;">
                <div class="form-group">
                    <label>用户名</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="registerUsername" class="form-control" placeholder="请输入用户名（至少2位）" autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="registerPassword" class="form-control" placeholder="请输入密码（至少4位）" autocomplete="new-password">
                    </div>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✓</span>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="请再次输入密码">
                    </div>
                </div>
                <button type="submit" class="btn">注册</button>
            </form>

            <div id="message" class="message"></div>
            <div class="footer-info">
                <span id="apiStatus">🌐 API: /api</span>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const TOKEN_KEY = 'demo.jwt_token';
        const STORAGE_KEY = 'demo.last_username';

        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const messageDiv = document.getElementById('message');

        function showMessage(type, text) {
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
                messageDiv.className = 'message';
            }, 3000);
        }

        function switchTab(tab) {
            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
            }
            messageDiv.style.display = 'none';
        }

        async function apiRequest(endpoint, data) {
            const response = await fetch(`${API_BASE}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const text = await response.text();
            let result;
            try { result = JSON.parse(text); } catch (e) { result = { message: text }; }
            if (!response.ok) throw new Error(result.message || `HTTP ${response.status}`);
            return result;
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) {
                showMessage('error', '请填写用户名和密码');
                return;
            }
            const btn = loginForm.querySelector('.btn');
            btn.disabled = true;
            btn.textContent = '登录中...';
            try {
                const result = await apiRequest('/user/login', { username, password });
                if (result.token) {
                    localStorage.setItem(TOKEN_KEY, result.token);
                    localStorage.setItem(STORAGE_KEY, username);
                    showMessage('success', '登录成功！正在跳转...');
                    setTimeout(() => { window.location.href = '/product.html'; }, 1000);
                } else {
                    showMessage('error', result.message || '登录失败');
                }
            } catch (error) {
                showMessage('error', `登录失败：${error.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (!username || !password) {
                showMessage('error', '请填写用户名和密码');
                return;
            }
            if (username.length < 2) {
                showMessage('error', '用户名至少需要2个字符');
                return;
            }
            if (password.length < 4) {
                showMessage('error', '密码至少需要4位');
                return;
            }
            if (password !== confirm) {
                showMessage('error', '两次输入的密码不一致');
                return;
            }
            const btn = registerForm.querySelector('.btn');
            btn.disabled = true;
            btn.textContent = '注册中...';
            try {
                const result = await apiRequest('/user/register', { username, password });
                showMessage('success', result.message || '注册成功！请登录');
                document.getElementById('registerUsername').value = '';
                document.getElementById('registerPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                switchTab('login');
            } catch (error) {
                showMessage('error', `注册失败：${error.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = '注册';
            }
        });

        loginTab.addEventListener('click', () => switchTab('login'));
        registerTab.addEventListener('click', () => switchTab('register'));

        if (localStorage.getItem(TOKEN_KEY)) {
            window.location.href = '/product.html';
        }
        const lastUsername = localStorage.getItem(STORAGE_KEY);
        if (lastUsername) {
            document.getElementById('loginUsername').value = lastUsername;
        }
    </script>
</body>
</html>
