<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分布式秒杀系统 - 银行卡支付</title>
    <link rel="stylesheet" href="mall/css/neo-mall.css">
</head>
<body data-active="orders">
<header class="site-header" id="siteHeader"></header>
<main class="page cashier-page">
    <section class="cashier-qr-shell">
        <div class="panel-body" id="payBody"></div>
    </section>
</main>
<script src="mall/js/app-common.js"></script>
<script>
    const { $, apiRequest, formatMoney, escapeHtml, requireLogin, loading, emptyState, renderHeader, toast } = AppCommon;
    let order = null;

    function orderId() {
        return new URLSearchParams(location.search).get("orderId") || "";
    }

    function render() {
        $("#payBody").innerHTML = `
            <div class="cashier-topline">
                <div class="bank-card-preview">
                    <span>银行卡</span>
                    <strong>**** **** **** 0877</strong>
                    <em>DEMO BANK</em>
                </div>
                <div>
                    <h2>银行卡支付</h2>
                    <p>订单号：${escapeHtml(order.orderNo || "-")}</p>
                    <p>填写模拟银行卡信息后点击确认支付。</p>
                </div>
                <strong>${formatMoney(order.totalAmount)}</strong>
            </div>
            <form class="cashier-method-card auth-form" id="bankPayForm">
                <h3>银行卡</h3>
                <div class="form-grid">
                    <div class="field">
                        <label for="bankCardNo">银行卡号</label>
                        <input id="bankCardNo" value="6222 0206 0400 0877" autocomplete="off">
                    </div>
                    <div class="field">
                        <label for="bankCode">短信验证码</label>
                        <input id="bankCode" value="888888" autocomplete="off">
                    </div>
                </div>
                <div class="green-coupon">演示验证码为 888888，不会产生真实扣款。</div>
                <div class="toolbar" style="margin-top:20px;">
                    <button class="btn primary" id="confirmPayBtn" type="submit">确认支付</button>
                    <a class="btn ghost" href="/pay-select.html?orderId=${order.id}">返回收银台</a>
                </div>
            </form>
        `;
        $("#bankPayForm").addEventListener("submit", confirmPay);
    }

    async function confirmPay(event) {
        event.preventDefault();
        if ($("#bankCode").value.trim() !== "888888") return toast("验证码不正确", "error");
        try {
            $("#confirmPayBtn").disabled = true;
            order = await apiRequest(`/order/${order.id}/pay`, {
                method: "POST",
                body: JSON.stringify({ payMethod: "BANK" })
            });
            toast("银行卡支付成功", "success");
            setTimeout(() => location.href = `/order-detail.html?orderId=${order.id}`, 600);
        } catch (error) {
            toast(`支付失败：${error.message}`, "error");
            $("#confirmPayBtn").disabled = false;
        }
    }

    async function init() {
        if (!requireLogin()) return;
        await renderHeader("orders");
        const id = orderId();
        if (!id) {
            $("#payBody").innerHTML = emptyState("缺少订单 ID", "请从订单列表进入支付。");
            return;
        }
        $("#payBody").innerHTML = loading("正在进入银行卡支付...");
        try {
            order = await apiRequest(`/order/${id}`);
            render();
        } catch (error) {
            $("#payBody").innerHTML = emptyState("支付页加载失败", error.message);
        }
    }

    init();
</script>
</body>
</html>
