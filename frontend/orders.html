<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分布式秒杀系统 - 我的订单</title>
    <link rel="stylesheet" href="mall/css/neo-mall.css">
</head>
<body data-active="orders">
<header class="site-header" id="siteHeader"></header>
<main class="page orders-market-page">
    <div class="section-head">
        <div>
            <h2>我的订单</h2>
            <p>查看订单状态、金额、收货地址和商品明细。</p>
        </div>
        <a class="btn ghost" href="/shop.html">继续购物</a>
    </div>
    <nav class="order-filter-tabs" id="orderTabs"></nav>
    <section id="ordersRoot"></section>
</main>
<div class="modal-backdrop" id="reviewModal">
    <div class="modal-card">
        <button class="modal-close" id="closeReviewModal" type="button">×</button>
        <h3 id="reviewTitle">评价订单</h3>
        <form class="auth-form" id="reviewForm">
            <div class="field" id="reviewRatingField">
                <label>评分</label>
                <div class="rating-picker" id="ratingPicker">
                    <button type="button" data-star="1">★</button>
                    <button type="button" data-star="2">★</button>
                    <button type="button" data-star="3">★</button>
                    <button type="button" data-star="4">★</button>
                    <button type="button" data-star="5">★</button>
                </div>
            </div>
            <div class="field">
                <label for="reviewContent">内容</label>
                <textarea id="reviewContent" rows="4" placeholder="写下你的使用体验"></textarea>
            </div>
            <button class="btn primary" type="submit">提交</button>
        </form>
    </div>
</div>
<script src="mall/js/app-common.js"></script>
<script>
    const { $, apiRequest, formatMoney, formatDate, mapStatus, escapeHtml, requireLogin, loading, emptyState, renderHeader, toast } = AppCommon;
    let allOrders = [];
    let activeTab = "all";
    let activeReviewOrder = null;
    let reviewMode = "review";
    let rating = 5;
    let countdownTimer = null;

    const ORDER_TABS = [
        { key: "all", label: "全部" },
        { key: "shipping", label: "运送中" },
        { key: "receiving", label: "待签收" },
        { key: "completed", label: "已完成" },
        { key: "reviewed", label: "已评价" },
        { key: "unfinished", label: "未完成" }
    ];

    function orderGroup(order) {
        const status = String(order.status || "").toUpperCase();
        if (status === "PAID" || status === "SHIPPED") return "shipping";
        if (status === "DELIVERED") return "receiving";
        if (status === "COMPLETED" && !order.reviewed) return "completed";
        if (status === "COMPLETED" && order.reviewed) return "reviewed";
        if (status === "CREATED" || status === "CANCELLED") return "unfinished";
        return "unfinished";
    }

    function filteredOrders() {
        return activeTab === "all" ? allOrders : allOrders.filter(order => orderGroup(order) === activeTab);
    }

    function expireAt(order) {
        const submittedAt = Number(sessionStorage.getItem(`checkout.submittedAt:${order.id}`) || 0);
        if (submittedAt && String(order.status || "").toUpperCase() === "CREATED") {
            return submittedAt + 15 * 60 * 1000;
        }
        if (order.paymentExpiresAtMillis) return Number(order.paymentExpiresAtMillis);
        if (order.paymentSecondsLeft !== undefined && order.paymentSecondsLeft !== null) {
            return Date.now() + Number(order.paymentSecondsLeft || 0) * 1000;
        }
        const created = new Date(order.createdAt).getTime();
        return Number.isNaN(created) ? 0 : created + 15 * 60 * 1000;
    }

    function leftText(order) {
        const left = Math.max(0, expireAt(order) - Date.now());
        const minutes = Math.floor(left / 60000);
        const seconds = Math.floor((left % 60000) / 1000);
        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function renderTabs() {
        $("#orderTabs").innerHTML = ORDER_TABS.map(tab => {
            const count = tab.key === "all" ? allOrders.length : allOrders.filter(order => orderGroup(order) === tab.key).length;
            return `<button class="${activeTab === tab.key ? "active" : ""}" type="button" data-tab="${tab.key}">
                <span>${tab.label}</span><strong>${count}</strong>
            </button>`;
        }).join("");
        document.querySelectorAll("#orderTabs button").forEach(button => {
            button.addEventListener("click", () => {
                activeTab = button.dataset.tab;
                renderTabs();
                renderOrders(filteredOrders());
            });
        });
    }

    function renderOrders(orders) {
        if (!orders.length) {
            $("#ordersRoot").innerHTML = emptyState("暂无订单", "当前分类下没有订单。", '<a class="btn primary" href="/search.html">去选购</a>');
            return;
        }
        $("#ordersRoot").innerHTML = orders.map(order => `
            <article class="order-market-card">
                <div class="order-card-head">
                    <div>
                        <strong>订单号：${escapeHtml(order.orderNo)}</strong>
                        <p style="margin:6px 0 0;color:var(--muted);">下单时间：${formatDate(order.createdAt)}</p>
                    </div>
                    <span class="order-status-pill ${String(order.status || "").toLowerCase()}">${mapStatus(order.status)}</span>
                </div>
                <div class="order-market-body">
                    <div>
                        <span>收货人</span>
                        <strong>${escapeHtml(order.receiverName || "-")} ${escapeHtml(order.receiverPhone || "")}</strong>
                    </div>
                    <div>
                        <span>收货地址</span>
                        <strong>${escapeHtml(order.userAddress || "未填写")}</strong>
                    </div>
                    <div>
                        <span>订单金额</span>
                        <strong class="money">${formatMoney(order.totalAmount)}</strong>
                    </div>
                </div>
                <div class="order-actions" style="margin-top:16px;">
                    <a class="btn primary" href="/order-detail.html?orderId=${order.id}">查看详情</a>
                    ${order.status === "CREATED" ? `<a class="btn ghost" href="/pay-select.html?orderId=${order.id}">去支付</a>` : ""}
                    ${order.status === "DELIVERED" ? `<button class="btn ghost" type="button" data-action="receive" data-id="${order.id}">确认签收</button>` : ""}
                    ${order.status === "COMPLETED" && !order.reviewed ? `<button class="btn ghost" type="button" data-action="review" data-id="${order.id}">评价订单</button>` : ""}
                    ${order.status === "COMPLETED" && order.reviewed ? `<button class="btn ghost" type="button" data-action="followup" data-id="${order.id}">追评</button>` : ""}
                </div>
                ${order.status === "CREATED" ? `<div class="order-countdown">未支付订单将在 <strong data-order-countdown="${order.id}">${leftText(order)}</strong> 后自动取消</div>` : ""}
            </article>
        `).join("");
        document.querySelectorAll("[data-action]").forEach(button => {
            button.addEventListener("click", () => handleAction(button.dataset.action, Number(button.dataset.id)));
        });
        startCountdowns();
    }

    function startCountdowns() {
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(async () => {
            let expired = false;
            document.querySelectorAll("[data-order-countdown]").forEach(node => {
                const order = allOrders.find(item => Number(item.id) === Number(node.dataset.orderCountdown));
                if (!order) return;
                node.textContent = leftText(order);
                if (expireAt(order) <= Date.now()) expired = true;
            });
            if (expired) {
                clearInterval(countdownTimer);
                await loadOrders();
            }
        }, 1000);
    }

    async function handleAction(action, orderId) {
        const order = allOrders.find(item => Number(item.id) === Number(orderId));
        if (!order) return;
        if (action === "receive") {
            try {
                await apiRequest(`/order/${orderId}/receive`, { method: "POST" });
                toast("已签收，订单进入待评价", "success");
                await loadOrders();
            } catch (error) {
                toast(`签收失败：${error.message}`, "error");
            }
            return;
        }
        activeReviewOrder = order;
        reviewMode = action;
        rating = 5;
        $("#reviewTitle").textContent = action === "followup" ? "追加评价" : "评价订单";
        $("#reviewContent").value = "";
        $("#reviewRatingField").style.display = action === "followup" ? "none" : "grid";
        updateStars();
        $("#reviewModal").classList.add("show");
    }

    function closeReviewModal() {
        $("#reviewModal").classList.remove("show");
    }

    async function loadOrders() {
        allOrders = await apiRequest("/order/mine") || [];
        renderTabs();
        renderOrders(filteredOrders());
    }

    function updateStars() {
        document.querySelectorAll("#ratingPicker button").forEach(button => {
            button.classList.toggle("active", Number(button.dataset.star) <= rating);
        });
    }

    async function init() {
        if (!requireLogin()) return;
        await renderHeader("orders");
        $("#ordersRoot").innerHTML = loading("正在加载订单...");
        $("#closeReviewModal").addEventListener("click", closeReviewModal);
        $("#reviewModal").addEventListener("click", event => {
            if (event.target === $("#reviewModal")) closeReviewModal();
        });
        $("#ratingPicker").addEventListener("click", event => {
            const button = event.target.closest("button[data-star]");
            if (!button) return;
            rating = Number(button.dataset.star);
            updateStars();
        });
        $("#reviewForm").addEventListener("submit", async event => {
            event.preventDefault();
            if (!activeReviewOrder) return;
            const content = $("#reviewContent").value.trim() || (reviewMode === "followup" ? "追加评价：使用一段时间后依然满意。" : "商品体验很好，物流也很快。");
            try {
                if (reviewMode === "followup") {
                    await apiRequest(`/order/${activeReviewOrder.id}/followup`, {
                        method: "POST",
                        body: JSON.stringify({ rating: 5, content })
                    });
                    toast("追评已提交", "success");
                } else {
                    await apiRequest(`/order/${activeReviewOrder.id}/review`, {
                        method: "POST",
                        body: JSON.stringify({ rating, content })
                    });
                    toast("评价已提交", "success");
                }
                closeReviewModal();
                await loadOrders();
            } catch (error) {
                toast(`提交失败：${error.message}`, "error");
            }
        });
        try {
            await loadOrders();
        } catch (error) {
            $("#ordersRoot").innerHTML = emptyState("订单加载失败", error.message);
        }
    }

    init();
</script>
</body>
</html>
