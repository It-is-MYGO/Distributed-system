<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分布式秒杀系统 - 我的订单</title>
    <link rel="stylesheet" href="mall/css/neo-mall.css">
</head>
<body data-active="orders">
<header class="site-header" id="siteHeader"></header>
<main class="page orders-market-page">
    <div class="section-head">
        <div>
            <h2>我的订单</h2>
            <p>查看订单状态、金额、收货地址和商品明细。</p>
        </div>
        <a class="btn ghost" href="/shop.html">继续购物</a>
    </div>
    <section id="ordersRoot"></section>
</main>
<script src="mall/js/app-common.js"></script>
<script>
    const { $, apiRequest, formatMoney, formatDate, mapStatus, escapeHtml, requireLogin, loading, emptyState, renderHeader } = AppCommon;

    function renderOrders(orders) {
        if (!orders.length) {
            $("#ordersRoot").innerHTML = emptyState("暂无订单", "完成一次购物车结算后，订单会出现在这里。", '<a class="btn primary" href="/search.html">去选购</a>');
            return;
        }
        $("#ordersRoot").innerHTML = orders.map(order => `
            <article class="order-market-card">
                <div class="order-card-head">
                    <div>
                        <strong>订单号：${escapeHtml(order.orderNo)}</strong>
                        <p style="margin:6px 0 0;color:var(--muted);">下单时间：${formatDate(order.createdAt)}</p>
                    </div>
                    <span class="order-status-pill ${String(order.status || "").toLowerCase()}">${mapStatus(order.status)}</span>
                </div>
                <div class="order-market-body">
                    <div>
                        <span>收货人</span>
                        <strong>${escapeHtml(order.receiverName || "-")} ${escapeHtml(order.receiverPhone || "")}</strong>
                    </div>
                    <div>
                        <span>收货地址</span>
                        <strong>${escapeHtml(order.userAddress || "未填写")}</strong>
                    </div>
                    <div>
                        <span>订单金额</span>
                        <strong class="money">${formatMoney(order.totalAmount)}</strong>
                    </div>
                </div>
                <div class="order-actions" style="margin-top:16px;">
                    <a class="btn primary" href="/order-detail.html?orderId=${order.id}">查看详情</a>
                    ${order.status === "CREATED" ? `<a class="btn ghost" href="/pay-select.html?orderId=${order.id}">去支付</a>` : ""}
                </div>
            </article>
        `).join("");
    }

    async function init() {
        if (!requireLogin()) return;
        await renderHeader("orders");
        $("#ordersRoot").innerHTML = loading("正在加载订单...");
        try {
            const orders = await apiRequest("/order/mine") || [];
            renderOrders(orders);
        } catch (error) {
            $("#ordersRoot").innerHTML = emptyState("订单加载失败", error.message);
        }
    }

    init();
</script>
</body>
</html>
