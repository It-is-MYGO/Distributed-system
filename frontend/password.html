<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分布式秒杀系统 - 修改密码</title>
    <link rel="stylesheet" href="mall/css/neo-mall.css">
</head>
<body data-active="personal">
<header class="site-header" id="siteHeader"></header>
<main class="page account-security-page">
    <section class="panel account-security-card">
        <div class="panel-body">
            <div class="section-head">
                <div>
                    <h2>修改密码</h2>
                    <p>输入原密码，通过模拟邮箱/手机验证码后即可更新密码。</p>
                </div>
                <a class="btn ghost" href="/personal.html">返回个人中心</a>
            </div>
            <form id="passwordForm" class="auth-form">
                <div class="field"><label for="oldPassword">原密码</label><input id="oldPassword" type="password" autocomplete="current-password" required></div>
                <div class="field"><label for="newPassword">新密码</label><input id="newPassword" type="password" autocomplete="new-password" required></div>
                <div class="form-grid">
                    <div class="field"><label for="verifyCode">验证码</label><input id="verifyCode" placeholder="点击发送后填写" required></div>
                    <button class="btn ghost send-code-btn" id="sendCodeBtn" type="button">发送验证码</button>
                </div>
                <button class="btn primary" type="submit">确认修改</button>
            </form>
        </div>
    </section>
</main>
<script src="mall/js/app-common.js"></script>
<script>
    const { $, apiRequest, requireLogin, renderHeader, toast } = AppCommon;
    const MESSAGE_KEY = "demo.message_box";

    function pushMessage(type, title, content) {
        const saved = JSON.parse(localStorage.getItem(MESSAGE_KEY) || "[]");
        const messages = Array.isArray(saved) ? saved : [];
        messages.unshift({ type, title, content, time: new Date().toLocaleString("zh-CN"), read: false });
        localStorage.setItem(MESSAGE_KEY, JSON.stringify(messages.slice(0, 60)));
    }

    async function init() {
        if (!requireLogin()) return;
        await renderHeader("personal");
        $("#sendCodeBtn").addEventListener("click", () => {
            $("#verifyCode").value = "888888";
            pushMessage("security", "验证码提醒", "模拟验证码已发送：888888。");
            toast("验证码已发送到绑定邮箱/手机号（模拟）", "success");
        });
        $("#passwordForm").addEventListener("submit", async event => {
            event.preventDefault();
            try {
                await apiRequest("/user/me", {
                    method: "PUT",
                    body: JSON.stringify({
                        oldPassword: $("#oldPassword").value,
                        newPassword: $("#newPassword").value,
                        verifyCode: $("#verifyCode").value.trim()
                    })
                });
                pushMessage("security", "密码修改成功", "账号密码已更新，下次登录请使用新密码。");
                toast("密码已修改", "success");
                setTimeout(() => location.href = "/personal.html", 700);
            } catch (error) {
                toast(`修改失败：${error.message}`, "error");
            }
        });
    }

    init();
</script>
</body>
</html>
