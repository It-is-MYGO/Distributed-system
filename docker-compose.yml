services:
  mysql:
    image: mysql:8.4
    container_name: ds-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: distributed_system
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    container_name: ds-redis
    ports:
      - "6379:6379"

  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ds-app-1
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      INSTANCE_ID: app-1
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ds-app-2
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
      INSTANCE_ID: app-2
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27
    container_name: ds-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - app1
      - app2

volumes:
  mysql_data:
