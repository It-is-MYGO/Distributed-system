<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录页 - Nginx静态托管</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 36px; background: #f5f7fb; }
    .card { max-width: 420px; background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 4px 16px rgba(0,0,0,.08); }
    input, button { width: 100%; padding: 10px; margin-top: 10px; }
    button { cursor: pointer; border: 0; background: #2563eb; color: #fff; }
    #msg { margin-top: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="card">
    <h2>账号登录</h2>
    <p>当前页面由 Nginx 静态托管，API 代理到后端集群。</p>
    <input id="username" placeholder="用户名" />
    <input id="password" type="password" placeholder="密码" />
    <button id="registerBtn">注册</button>
    <button id="loginBtn">登录并跳转商品页</button>
    <div id="msg"></div>
  </div>
  <script>
    const msgEl = document.getElementById("msg");
    const tokenKey = "demo.jwt_token";
    const apiPrefix = "/api";

    async function post(path) {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const res = await fetch(`${apiPrefix}${path}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
      return data;
    }

    document.getElementById("registerBtn").onclick = async () => {
      try {
        const data = await post("/user/register");
        msgEl.textContent = data.message || "注册成功";
      } catch (e) {
        msgEl.textContent = "注册失败: " + e.message;
      }
    };

    document.getElementById("loginBtn").onclick = async () => {
      try {
        const data = await post("/user/login");
        if (data.token) {
          localStorage.setItem(tokenKey, data.token);
          window.location.href = "/product.html";
          return;
        }
        msgEl.textContent = "登录失败: 未返回token";
      } catch (e) {
        msgEl.textContent = "登录失败: " + e.message;
      }
    };
  </script>
</body>
</html>
