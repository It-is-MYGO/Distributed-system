<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商品页 - Nginx静态托管</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 28px; background: #f5f7fb; }
    .card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 4px 16px rgba(0,0,0,.08); margin-bottom: 14px; }
    input, button { padding: 8px; margin-right: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border-bottom: 1px solid #e5e7eb; text-align: left; padding: 10px 8px; }
    #msg { margin-top: 10px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="card">
    <h2>商品主页</h2>
    <button id="refreshBtn">刷新商品</button>
    <button id="logoutBtn">退出</button>
    <span style="margin-left: 12px;">负载均衡算法:
      <select id="algo">
        <option value="/api">Round Robin</option>
        <option value="/api-lc">Least Conn</option>
      </select>
    </span>
  </div>

  <div class="card">
    <h3>创建商品</h3>
    <input id="name" placeholder="商品名" />
    <input id="price" type="number" step="0.01" placeholder="价格" />
    <input id="stock" type="number" placeholder="库存" />
    <button id="createBtn">创建</button>
  </div>

  <div class="card">
    <table>
      <thead><tr><th>ID</th><th>名称</th><th>价格</th><th>数量</th><th>动作</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="msg"></div>
  </div>

  <script>
    const token = localStorage.getItem("demo.jwt_token");
    const tbody = document.getElementById("tbody");
    const msg = document.getElementById("msg");
    if (!token) window.location.href = "/";

    function apiBase() {
      return document.getElementById("algo").value;
    }

    async function req(path, options = {}) {
      const headers = Object.assign({}, options.headers || {}, { Authorization: `Bearer ${token}` });
      const res = await fetch(`${apiBase()}${path}`, Object.assign({}, options, { headers }));
      const text = await res.text();
      let data = {};
      try { data = text ? JSON.parse(text) : {}; } catch (_) { data = { message: text }; }
      if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
      return data;
    }

    async function loadProducts() {
      try {
        const list = await req("/product");
        tbody.innerHTML = "";
        list.forEach(p => {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${p.id}</td><td>${p.name}</td><td>${p.price}</td><td><input id="q${p.id}" type="number" value="1" min="1" style="width:70px;"></td><td><button data-id="${p.id}">下单</button></td>`;
          tr.querySelector("button").onclick = () => order(p.id);
          tbody.appendChild(tr);
        });
        msg.textContent = `已加载 ${list.length} 个商品`;
      } catch (e) {
        msg.textContent = `加载失败: ${e.message}`;
      }
    }

    async function order(productId) {
      try {
        const quantity = Number(document.getElementById(`q${productId}`).value || 1);
        const data = await req("/order", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ productId, quantity })
        });
        msg.textContent = `下单成功: 订单ID=${data.id}`;
      } catch (e) {
        msg.textContent = `下单失败: ${e.message}`;
      }
    }

    document.getElementById("createBtn").onclick = async () => {
      try {
        const name = document.getElementById("name").value.trim();
        const price = Number(document.getElementById("price").value);
        const stock = Number(document.getElementById("stock").value);
        await req("/product", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, price, stock })
        });
        await loadProducts();
      } catch (e) {
        msg.textContent = `创建失败: ${e.message}`;
      }
    };

    document.getElementById("refreshBtn").onclick = loadProducts;
    document.getElementById("logoutBtn").onclick = () => {
      localStorage.removeItem("demo.jwt_token");
      window.location.href = "/";
    };
    document.getElementById("algo").onchange = loadProducts;
    loadProducts();
  </script>
</body>
</html>
