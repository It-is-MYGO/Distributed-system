spring:
  datasource:
    url: jdbc:mysql://mysql:3306/distributed_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&autoReconnect=true&useServerPrepStmts=true&cachePrepStmts=true&rewriteBatchedStatements=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root123
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: ds-seckill-group
      auto-offset-reset: earliest
  h2:
    console:
      enabled: false
  web:
    resources:
      static-locations: classpath:/static/,file:./frontend/,file:../frontend/

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: ${SERVER_PORT:8080}

app:
  instance-id: ${INSTANCE_ID:local}
  worker-id: ${INSTANCE_WORKER_ID:1}
  nacos:
    server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
  kafka:
    seckill-topic: seckill-orders
